<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durak Game</title>

<style>
body{
    margin:0;
    background:#0b6623;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

.table{
    width:90%;
    height:250px;
    margin:20px auto;
    border:2px solid white;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:60px;
    height:90px;
    background:white;
    color:black;
    border-radius:10px;
    display:inline-flex;
    justify-content:center;
    align-items:center;
    margin:5px;
    font-size:24px;
    font-weight:bold;
}

.hand{
    margin-top:20px;
}
</style>
</head>

<body>
    <h1>🃏 Durak Game</h1>

    <p>Суперник</p>
    <div>
        <div class="card">🂠</div>
        <div class="card">🂠</div>
        <div class="card">🂠</div>
    </div>

    <div class="table">
        Стіл
    </div>

    <p>Твої карти</p>
    <div class="hand">
        <div class="card">6♠</div>
        <div class="card">10♥</div>
        <div class="card">A♦</div>
    </div>
<script>
const suits = ["♠", "♥", "♦", "♣"];
const ranks = ["6", "7", "8", "9", "10", "J", "Q", "K", "A"];

let deck = [];

function createDeck() {
deck.sort(() => Math.random() - 0.5);

console.log(deck);

    for (const suit of suits) {
        for (const rank of ranks) {
            deck.push({
                rank: rank,
                suit: suit
            });
        }
    }

    console.log(deck);
}

createDeck();
</script>
